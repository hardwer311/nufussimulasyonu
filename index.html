<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRD-SEC-001 | Uganda Nüfus Analizi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --hrd-blue: #00aaff; --hrd-pink: #ff00ff; --bg-dark: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; height: 100%; overflow-x: hidden; }

        #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        .hrd-logo {
            font-size: 3rem; font-weight: bold; color: var(--hrd-blue);
            letter-spacing: 10px; text-shadow: 0 0 20px rgba(0, 170, 255, 0.6);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #main-content { padding: 15px; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: opacity 0.8s; }
        
        .header { width: 100%; max-width: 600px; border-left: 4px solid var(--hrd-blue); padding-left: 15px; margin-bottom: 20px; box-sizing: border-box; }
        .header h1 { font-size: 1.3rem; margin: 0; color: var(--hrd-blue); }
        .header p { margin: 3px 0; font-size: 0.85rem; color: #ccc; line-height: 1.3; }
        
        .container { 
            background: #111; 
            padding: 15px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 600px; 
            border: 1px solid #222; 
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0,170,255,0.1); 
        }

        .chart-container { position: relative; height: 400px; width: 100%; }

        .controls { margin-top: 20px; background: #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; }
        input[type=range] { width: 100%; accent-color: var(--hrd-blue); cursor: pointer; margin-top: 10px; }
        .year-label { font-size: 1.2rem; color: var(--hrd-blue); font-weight: bold; margin-bottom: 5px; }
        
        .data-source { margin-top: 15px; font-size: 0.6rem; color: #666; font-style: italic; text-align: center; }
        .footer-brand { margin-top: 10px; font-size: 0.65rem; color: #444; letter-spacing: 2px; font-weight: bold; text-align: center; padding-bottom: 20px; }
        .footer-brand span { color: var(--hrd-blue); }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.1rem; }
            .chart-container { height: 350px; }
            .hrd-logo { font-size: 2.5rem; letter-spacing: 5px; }
        }
    </style>
</head>
<body>

<div id="intro">
    <div class="hrd-logo">HRD</div>
    <div style="font-size: 0.5rem; letter-spacing: 2px; color: #444; margin-top: 5px;">UGANDA NÜFUS ANALİZ SİSTEMİ</div>
</div>

<div id="main-content">
    <div class="header">
        <h1>Coğrafya Performans Ödevi: Uganda</h1>
        <p><strong>Hazırlayan:</strong> Yakub Çadırcı</p>
        <p><strong>Sınıf / No:</strong> 9-AS / 25121</p>
        <p><strong>Okul:</strong> İTOSB Mesleki Ve Teknik Anadolu Lisesi</p>
    </div>

    <div class="container">
        <div class="chart-container">
            <canvas id="popPyramid"></canvas>
        </div>
        <div class="controls">
            <div class="year-label">Projeksiyon Yılı: <span id="yearDisplay">2026</span></div>
            <input type="range" id="slider" min="2026" max="2050" value="2026">
        </div>
    </div>

    <div class="data-source">Analiz Verisi: Uganda 2026 Demografik Tahmin Modeli</div>
    <div class="footer-brand">POWERED BY <span>HRD YAZILIMCILIK</span></div>
</div>

<script>
    window.onload = () => {
        setTimeout(() => {
            const intro = document.getElementById('intro');
            const main = document.getElementById('main-content');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                main.style.opacity = '1';
            }, 500);
        }, 1200); 
    };

    const ctx = document.getElementById('popPyramid').getContext('2d');
    const ageLabels = ['0-4', '5-14', '15-24', '25-44', '45-64', '65-79', '80+'].reverse();
    
    // Uganda 2026 Tahmini Verileri (Aşağıdan Yukarıya Genişten Dara)
    // Erkek (Negatif), Kadın (Pozitif)
    const mBase = [-100, -500, -2500, -6000, -9000, -11500, -12500];
    const fBase = [150, 600, 2700, 6200, 9200, 11700, 12800];

    const chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ageLabels,
            datasets: [
                { label: 'Erkek', data: [...mBase], backgroundColor: '#00aaff', borderRadius: 2 },
                { label: 'Kadın', data: [...fBase], backgroundColor: '#ff00ff', borderRadius: 2 }
            ]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { 
                    stacked: true, 
                    ticks: { callback: v => Math.abs(v), color: '#888', font: { size: 10 } }, 
                    grid: { color: '#222' } 
                },
                y: { 
                    stacked: true, 
                    grid: { display: false }, 
                    ticks: { color: '#fff', font: { size: 11, weight: 'bold' } } 
                }
            },
            plugins: { 
                legend: { 
                    position: 'bottom', 
                    labels: { color: '#eee', padding: 20, font: { size: 12 } } 
                },
                tooltip: {
                    callbacks: {
                        label: (c) => `${c.dataset.label}: ${Math.abs(c.raw)}`
                    }
                }
            }
        }
    });

    document.getElementById('slider').addEventListener('input', (e) => {
        const year = parseInt(e.target.value);
        document.getElementById('yearDisplay').innerText = year;
        const diff = year - 2026;

        chart.data.datasets[0].data = mBase.map((val, i) => val - (diff * (7 - i) * 10));
        chart.data.datasets[1].data = fBase.map((val, i) => val + (diff * (7 - i) * 10));
        chart.update('none');
    });
</script>
</body>
</html>
